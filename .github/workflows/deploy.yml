name: Deploy Wiki

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  DEPLOY_HOST: 106.54.16.124
  DEPLOY_USER: root
  DEPLOY_ROOT: /www/wwwroot/wiki.hs-fpv.com

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          BASE_PATH: /
          URL: https://wiki.hs-fpv.com
          ORG: Niu-wei-ba

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: wiki-site
          path: build
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {}
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: wiki-site
          path: build

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.WIKI_DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          test -n "$SSH_PRIVATE_KEY" || { echo 'WIKI_DEPLOY_SSH_PRIVATE_KEY is not configured.'; exit 1; }
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload and activate release
        env:
          RELEASE_NAME: wiki-${{ github.sha }}
        run: |
          set -euo pipefail
          release_path="$DEPLOY_ROOT/releases/$RELEASE_NAME"
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$release_path'"
          rsync -az --delete -e 'ssh -i ~/.ssh/deploy_key' build/ "$DEPLOY_USER@$DEPLOY_HOST:$release_path/"
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "set -e; ln -sfn '$release_path' '$DEPLOY_ROOT/current.next'; mv -Tf '$DEPLOY_ROOT/current.next' '$DEPLOY_ROOT/current'; find '$DEPLOY_ROOT/releases' -mindepth 1 -maxdepth 1 -type d -printf '%T@ %p\\n' | sort -nr | awk 'NR > 5 {print \$2}' | xargs -r rm -rf"
